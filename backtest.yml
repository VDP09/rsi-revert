name: Backtest

on:
  workflow_dispatch:
    inputs:
      history_start:
        description: "Override backtest history start (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Override history_start (if provided)
        if: ${{ github.event.inputs.history_start != '' }}
        run: |
          sed -i "s/^  history_start:.*/  history_start: \"${{ github.event.inputs.history_start }}\"/" config/config.yaml

      - name: Run backtest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          mkdir -p reports
          python scripts/run_backtest.py --config config/config.yaml --out-dir reports

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: backtest-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
