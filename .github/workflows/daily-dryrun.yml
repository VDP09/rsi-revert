name: Daily Dry Run (Monitor)

# Same schedule as the live daily-trade workflow but submits NO orders.
# Use this to monitor what the system would do before committing to actual
# paper trading. Once you trust the report, disable this and enable
# daily-trade.yml.

on:
  schedule:
    # 21:05 UTC weekdays = ~5 min after US market close.
    - cron: "5 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-dryrun
  cancel-in-progress: false

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: market-data-${{ runner.os }}-dryrun-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-dryrun-
            market-data-${{ runner.os }}-

      - name: Run daily decision (dry run, no orders submitted)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
        run: python scripts/run_daily.py --config config/config.yaml --dry-run

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-dryrun-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
